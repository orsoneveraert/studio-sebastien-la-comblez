<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="format-detection" content="telephone=no" />
    <title>Studio Sebastien Lacomblez - V2</title>
    <meta
      name="description"
      content="Version 2 du site Studio Sebastien Lacomblez, direction editoriale et verticale."
    />
    <link rel="icon" type="image/png" href="../../assets/icons/favicon-sl.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="v2.css" />
  </head>
  <body>
    <main>
      <section class="v2-hero" aria-label="Hero">
        <video
          class="v2-hero__video"
          autoplay
          muted
          loop
          playsinline
          webkit-playsinline
          preload="metadata"
          aria-hidden="true"
        >
          <source src="../../assets/video/hero-boomerang.mp4" type="video/mp4" />
        </video>
        <div class="v2-hero__shade" aria-hidden="true"></div>
        <div class="v2-hero__content">
          <h1 class="v2-hero__title">
            <span>studio</span>
            <span>sebastien</span>
            <span>lacomblez</span>
          </h1>
        </div>
        <button class="v2-scroll" type="button" aria-label="Descendre vers le contenu">
          <img
            src="../../assets/icons/hero-scroll-logo.png"
            alt=""
            aria-hidden="true"
            width="42"
            height="42"
          />
        </button>
      </section>

      <section class="v2-editorial" id="content">
        <div class="v2-canvas">
          <aside class="v2-rail" aria-hidden="true">
            <p class="v2-rail__title">Applied Poetics</p>
          </aside>

          <section class="v2-stack" aria-label="Modules editoriaux">
            <article class="v2-cell">
              <p class="v2-cell__meta">[001] / studio</p>
              <figure class="v2-card v2-card--image">
                <img src="../../assets/v2-images/img-31.jpg" alt="Vue de studio" width="1200" height="1600" loading="lazy" />
              </figure>
            </article>

            <article class="v2-cell">
              <p class="v2-cell__meta">[002] / paysage</p>
              <figure class="v2-card v2-card--image">
                <img src="../../assets/v2-images/img-12.jpg" alt="Portrait paysage" width="1200" height="1600" loading="lazy" />
              </figure>
            </article>

            <article class="v2-cell">
              <p class="v2-cell__meta">[003] / archive</p>
              <figure class="v2-card v2-card--image">
                <img src="../../assets/v2-images/img-08.jpg" alt="Archive visuelle" width="1200" height="1600" loading="lazy" />
              </figure>
            </article>

            <article class="v2-cell">
              <p class="v2-cell__meta">[004] / note</p>
              <div class="v2-card v2-card--text">
                <p>TURN</p>
              </div>
            </article>

            <article class="v2-cell">
              <p class="v2-cell__meta">[005] / corps</p>
              <figure class="v2-card v2-card--image">
                <img src="../../assets/v2-images/img-17.jpg" alt="Etude de geste" width="1200" height="1600" loading="lazy" />
              </figure>
            </article>
          </section>
        </div>
      </section>
    </main>

    <script src="v2.js"></script>
  </body>
</html>
