<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Studio Sebastien Lacomblez - Versions</title>
    <meta
      name="description"
      content="Selection des differentes versions du site Studio Sebastien Lacomblez."
    />
    <link rel="icon" type="image/png" href="assets/icons/favicon-sl.png" />
    <link rel="stylesheet" href="hub.css" />
  </head>
  <body class="hub-page">
    <main class="hub-shell">
      <header class="hub-header">
        <p class="hub-kicker">Versions</p>
        <h1 class="hub-title">Studio Sebastien Lacomblez</h1>
        <p class="hub-intro">
          Selection des propositions disponibles. Clique sur une version pour l'ouvrir. Appuie sur
          <kbd>Esc</kbd> pour revenir ici.
        </p>
      </header>

      <section class="hub-grid" aria-label="Versions du site">
        <button
          class="site-card"
          type="button"
          data-site-id="studio-sebastien-lacomblez"
          data-site-url="versions/studio-sebastien-lacomblez/"
          aria-label="Ouvrir la version Studio Sebastien Lacomblez"
        >
          <span class="site-card__media">
            <img
              src="assets/photos/landscape-05.jpg"
              alt=""
              width="896"
              height="896"
              loading="eager"
            />
          </span>
          <span class="site-card__body">
            <span class="site-card__title">Version 01</span>
            <span class="site-card__meta">Studio Sebastien Lacomblez</span>
            <span class="site-card__url">versions/studio-sebastien-lacomblez/</span>
          </span>
        </button>
      </section>
    </main>

    <section class="site-viewer" aria-hidden="true" hidden>
      <div class="site-viewer__bar">
        <div class="site-viewer__meta">
          <p class="site-viewer__label">Version ouverte</p>
          <p class="site-viewer__name" data-viewer-name>Version 01</p>
        </div>
        <button class="site-viewer__close" type="button" aria-label="Fermer la version">
          Retour
        </button>
      </div>
      <iframe
        class="site-viewer__frame"
        title="Apercu de la version du site"
        loading="eager"
      ></iframe>
    </section>

    <script src="hub.js"></script>
  </body>
</html>
